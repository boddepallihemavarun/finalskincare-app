<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AURA | Modern Luxury Skincare Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&amp;family=Manrope:wght@200;300;400;500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif:wght@300;400;700&display=swap');
        
        body {
            background-color: #131313;
            color: #e5e2e1;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(32, 31, 31, 0.6);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .gold-glow {
            box-shadow: 0px 20px 40px rgba(196, 168, 130, 0.08);
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, #e1c39b 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.3;
        }

        .input-underline:focus-within label,
        .input-underline input:not(:placeholder-shown) + label {
            transform: translateY(-1.5rem) scale(0.8);
            color: #e1c39b;
        }

        .gradient-border-btn {
            position: relative;
            background: #131313;
            background-clip: padding-box;
            border: 2px solid transparent;
        }

        .gradient-border-btn::before {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            z-index: -1;
            margin: -2px;
            border-radius: inherit;
            background: linear-gradient(45deg, #e1c39b, #c4a882, #513d1f, #e1c39b);
            background-size: 300% 300%;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-fixed": "#fddeb5",
                        "on-tertiary-fixed-variant": "#3b475c",
                        "on-primary-container": "#513d1f",
                        "on-secondary-fixed": "#221a0f",
                        "secondary": "#d2c4b2",
                        "primary": "#e1c39b",
                        "on-primary-fixed-variant": "#584325",
                        "inverse-primary": "#715b3a",
                        "surface-container-high": "#2a2a2a",
                        "surface-container-low": "#1c1b1b",
                        "tertiary": "#bcc8e2",
                        "surface-container": "#201f1f",
                        "secondary-fixed-dim": "#d2c4b2",
                        "outline": "#998f84",
                        "on-background": "#e5e2e1",
                        "primary-fixed-dim": "#e0c29a",
                        "inverse-surface": "#e5e2e1",
                        "outline-variant": "#4d463c",
                        "on-error-container": "#ffdad6",
                        "on-tertiary-fixed": "#0f1c2f",
                        "on-primary": "#3f2d11",
                        "on-primary-fixed": "#281901",
                        "on-tertiary-container": "#354156",
                        "surface-dim": "#131313",
                        "inverse-on-surface": "#313030",
                        "surface-container-lowest": "#0e0e0e",
                        "on-tertiary": "#253145",
                        "surface": "#131313",
                        "tertiary-fixed-dim": "#bbc7e1",
                        "background": "#131313",
                        "on-error": "#690005",
                        "secondary-container": "#51483a",
                        "secondary-fixed": "#efe0cd",
                        "error": "#ffb4ab",
                        "surface-container-highest": "#353534",
                        "on-surface-variant": "#d0c5b8",
                        "on-secondary": "#372f22",
                        "surface-tint": "#e0c29a",
                        "tertiary-fixed": "#d7e3fd",
                        "tertiary-container": "#a1adc6",
                        "on-secondary-fixed-variant": "#4f4538",
                        "surface-variant": "#353534",
                        "error-container": "#93000a",
                        "primary-container": "#c4a882",
                        "on-surface": "#e5e2e1",
                        "on-secondary-container": "#c4b6a5",
                        "surface-bright": "#3a3939"
                    },
                    fontFamily: {
                        "headline": ["Cormorant Garamond"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-body selection:bg-primary/30">
<!-- Ambient Particle Layer -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
<div class="particle w-1 h-1 top-[80%] left-[20%] opacity-40"></div>
<div class="particle w-2 h-2 top-[60%] left-[70%] opacity-20"></div>
<div class="particle w-1.5 h-1.5 top-[90%] left-[45%] opacity-30"></div>
<div class="particle w-1 h-1 top-[40%] left-[10%] opacity-10"></div>
<div class="particle w-2 h-2 top-[75%] left-[85%] opacity-25"></div>
<div class="particle w-1 h-1 top-[20%] left-[60%] opacity-15"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative min-h-screen w-full flex items-center justify-center p-6 bg-surface">
<!-- Background Imagery (Faded) -->
<div class="absolute inset-0 z-0 opacity-20 grayscale">
<img class="w-full h-full object-cover" data-alt="abstract macro photography of flowing skincare serum with microbubbles and golden reflections on a dark liquid surface" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCggKqR4jhf4QasZNPKBaGbRS5BhXZKedzl83EjZW8p3hDbqhpvbHe1K_CiPuOb8VwbqB5ha46Clpk7P7Xg5sXXKuYAIN384_Du_QX39CIPhrT8zVen8GjOgCxS71hh4AU5idJRtHRxMRfRJxIpDt2ZPqGHqIGe0__0F8V14NwXcHA0W6YnWgq8ABuryLCjeJXbSedKLNmGCO2uF0IP5eJsnq7ft8xkmhRs0Rt9jSrSmP4FfKmV6o4-OFYvPg1TXJWLUVdB5B_Y0dQ"/>
</div>
<!-- Login Container -->
<div class="relative z-10 w-full max-w-md">
<div class="glass-card gold-glow p-10 md:p-14 rounded-sm">
<!-- Brand Anchor -->
<div class="flex flex-col items-center mb-12">
<div class="mb-6 w-24 h-24 flex items-center justify-center">
<svg class="w-full h-full stroke-primary fill-none" viewbox="0 0 100 100">
<path d="M50 10 L85 85 L50 70 L15 85 Z" stroke-dasharray="300" stroke-dashoffset="0" stroke-width="0.5"></path>
<circle cx="50" cy="45" r="15" stroke-width="0.5"></circle>
</svg>
</div>
<h1 class="font-headline text-4xl tracking-[0.3em] text-primary uppercase text-center">
                        AURA
                    </h1>
<p class="font-label text-[10px] tracking-[0.2em] text-on-surface-variant uppercase mt-2">
                        Sacred Skin Rituals
                    </p>
</div>
<!-- Form Section -->
<form action="#" class="space-y-10" method="POST">
<!-- Email Field -->
<div class="relative group input-underline">
<input class="w-full bg-transparent border-0 border-b border-outline-variant/30 py-2 px-0 text-on-surface focus:ring-0 focus:border-primary transition-colors duration-500 peer" id="email" name="email" placeholder=" " required="" type="email"/>
<label class="absolute left-0 top-2 text-on-surface-variant/60 font-label text-xs uppercase tracking-widest transition-all duration-300 pointer-events-none peer-focus:text-primary" for="email">
                            Email Address
                        </label>
</div>
<!-- Password Field -->
<div class="relative group input-underline">
<input class="w-full bg-transparent border-0 border-b border-outline-variant/30 py-2 px-0 text-on-surface focus:ring-0 focus:border-primary transition-colors duration-500 peer" id="password" name="password" placeholder=" " required="" type="password"/>
<label class="absolute left-0 top-2 text-on-surface-variant/60 font-label text-xs uppercase tracking-widest transition-all duration-300 pointer-events-none peer-focus:text-primary" for="password">
                            Password
                        </label>
<button class="absolute right-0 top-2 text-on-surface-variant/40 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
<div class="flex items-center justify-between pt-2">
<div class="flex items-center">
<input class="w-4 h-4 bg-surface-container border-outline-variant text-primary focus:ring-offset-surface focus:ring-primary rounded-none" id="remember" type="checkbox"/>
<label class="ml-2 font-label text-[10px] uppercase tracking-widest text-on-surface-variant/60" for="remember">Remember Ritual</label>
</div>
<a class="font-label text-[10px] uppercase tracking-widest text-primary hover:text-primary-container transition-colors" href="#">Forgot?</a>
</div>
<!-- Submit Button -->
<div class="pt-6">
<button class="gradient-border-btn w-full py-4 text-on-surface font-label text-xs uppercase tracking-[0.2em] hover:text-primary transition-all duration-500 group overflow-hidden" type="submit">
<span class="relative z-10">Sign In</span>
<div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
</div>
</form>
<!-- Footer Actions -->
<div class="mt-12 text-center">
<p class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant/40">
                        New to the collection?
                    </p>
<a class="inline-block mt-4 font-label text-xs uppercase tracking-[0.15em] text-on-surface border-b border-outline-variant/30 hover:border-primary transition-colors pb-1" href="#">
                        Create An Account
                    </a>
</div>
</div>
</div>
</main>
<!-- Navigation suppressed for transactional focus per Conflict Resolution Protocol -->
<!-- Decorative Corner Element -->
<div class="fixed bottom-12 right-12 z-20 hidden md:block">
<div class="w-32 h-[1px] bg-gradient-to-r from-transparent via-primary/20 to-transparent"></div>
<p class="mt-4 font-headline italic text-on-surface-variant/30 text-right text-lg">
            Embrace the Radiance
        </p>
</div>
</body></html>
